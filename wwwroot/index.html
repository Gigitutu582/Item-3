<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секретный Санта – Регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎄 Секретный Санта 🎁</h1>
        <div class="card">
            <h2>Участвовать в игре</h2>
            <div class="form-group">
                <input type="text" id="userName" placeholder="Ваше имя" autocomplete="off">
                <button id="registerBtn">Получить подопечного</button>
            </div>
            <div id="resultArea" class="result-area hidden">
                <p id="greeting"></p>
                <div class="wish-area hidden">
                    <textarea id="wishText" rows="3" placeholder="Напишите, что вы хотели бы получить в подарок..."></textarea>
                    <button id="sendWishBtn">Отправить пожелание</button>
                    <p id="wishStatus"></p>
                </div>
            </div>
        </div>
        <div class="footer">
            <a href="wish.html" target="_blank">🔍 Узнать пожелание друга</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
