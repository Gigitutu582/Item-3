<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секретный Санта – Узнать пожелание</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎁 Узнать пожелание</h1>
        <div class="card">
            <p>Введите имя участника, которому вы дарите подарок:</p>
            <div class="form-group">
                <input type="text" id="friendName" placeholder="Имя друга">
                <button id="getWishBtn">Узнать пожелание</button>
            </div>
            <div id="wishResult" class="result-area hidden">
                <p id="wishDisplay"></p>
            </div>
        </div>
        <div class="footer">
            <a href="index.html">← Вернуться к регистрации</a>
        </div>
    </div>
    <script src="wish.js"></script>
</body>
</html>
